<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    /* CSS 커스텀 프로퍼티 — 색상과 반경을 한 곳에서 관리 */
    :root {
      --color-primary: #4f8ef7;
      --color-primary-hover: #3a7de0;
      --color-border: #e2e8f0;
      --color-bg: #f0f4f8;
      --color-surface: #f7fafc;
      --color-surface-checked: #edf2f7;
      --color-text: #1a202c;
      --color-text-muted: #718096;
      --color-text-item: #2d3748;
      --color-text-checked: #a0aec0;
      --color-danger: #e53e3e;
      --color-danger-bg: #fff5f5;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--color-bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: var(--color-text);
      margin-bottom: 8px;
    }

    .summary {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    /* label을 시각적으로 숨기되 스크린 리더에는 노출 */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: var(--color-primary);
    }

    .input-row button {
      padding: 10px 18px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: var(--color-primary-hover);
    }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      flex: 1;
      padding: 6px;
      border: 1.5px solid var(--color-border);
      border-radius: 6px;
      background: #fff;
      font-size: 0.82rem;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--color-surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--color-border);
      transition: opacity 0.2s;
    }

    li.checked {
      opacity: 0.55;
      background: var(--color-surface-checked);
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--color-primary);
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: var(--color-text-item);
      word-break: break-all;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: var(--color-text-checked);
    }

    li .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-border);
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    li .delete-btn:hover {
      color: var(--color-danger);
    }

    .empty {
      text-align: center;
      color: var(--color-text-checked);
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius);
      color: var(--color-danger);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .clear-btn:hover {
      background: var(--color-danger-bg);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>
    <p class="summary" id="summary">0개 항목</p>

    <div class="input-row">
      <!-- label을 시각적으로 숨겨 접근성 확보 -->
      <label for="itemInput" class="sr-only">아이템 이름</label>
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="60" />
      <button id="addBtn" type="button">추가</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" type="button" data-filter="all">전체</button>
      <button class="filter-btn" type="button" data-filter="active">미완료</button>
      <button class="filter-btn" type="button" data-filter="done">완료</button>
    </div>

    <ul id="list"></ul>
    <div class="empty" id="empty" style="display:none">항목이 없습니다</div>

    <button class="clear-btn" id="clearBtn" type="button">완료 항목 삭제</button>
  </div>

  <script>
    const STORAGE_KEY = 'shopping_list_items';
    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let filter = 'all';

    const input = document.getElementById('itemInput');
    const listEl = document.getElementById('list');
    const emptyEl = document.getElementById('empty');
    const summaryEl = document.getElementById('summary');

    // 인라인 onclick 대신 addEventListener 사용
    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', clearChecked);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    // 필터 버튼 — 이벤트 위임으로 단일 리스너 처리
    document.querySelector('.filter-row').addEventListener('click', e => {
      const btn = e.target.closest('[data-filter]');
      if (!btn) return;
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.unshift({ id: Date.now(), text, checked: false });
      input.value = '';
      save();
      render();
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (item) item.checked = !item.checked;
      save();
      render();
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    function render() {
      const total = items.length;
      const done = items.filter(i => i.checked).length;
      summaryEl.textContent = `${total}개 항목 (완료 ${done}개)`;

      const filtered = items.filter(i => {
        if (filter === 'active') return !i.checked;
        if (filter === 'done') return i.checked;
        return true;
      });

      listEl.replaceChildren();

      if (filtered.length === 0) {
        emptyEl.style.display = 'block';
        return;
      }

      emptyEl.style.display = 'none';

      filtered.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.addEventListener('change', () => toggleItem(item.id));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.type = 'button';
        del.title = '삭제';
        del.setAttribute('aria-label', `${item.text} 삭제`);
        del.textContent = '✕';
        del.addEventListener('click', () => deleteItem(item.id));

        li.append(cb, span, del);
        listEl.appendChild(li);
      });
    }

    render();
  </script>
</body>
</html>
