<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>장바구니</title>
  <link rel="manifest" href="/mobile/manifest.json?v=3">
  <meta name="theme-color" content="#2563eb">
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="장바구니">
  <link rel="apple-touch-icon" sizes="192x192" href="/mobile/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #ffffff;
      --bg2:       #f8f9fa;
      --border:    #e5e7eb;
      --text:      #111827;
      --text2:     #6b7280;
      --accent:    #2563eb;
      --accent-bg: #eff6ff;
      --danger:    #ef4444;
      --success:   #22c55e;
      --radius:    12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }
    #loadingScreen {
      display: flex; height: 100vh; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
    }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loginScreen {
      display: none; min-height: 100vh; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 28px; text-align: center;
    }
    #loginScreen.active { display: flex; }
    .login-emoji { font-size: 3.5rem; margin-bottom: 20px; }
    .login-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .login-sub { color: var(--text2); font-size: 0.9rem; line-height: 1.7; margin-bottom: 40px; }
    .login-form { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: var(--radius);
      font-size: 1rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-kakao { background: #FEE500; color: #191919; }
    .btn-kakao:hover { background: #f0d800; }
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 1.05rem; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 6px; }
    .icon-btn {
      width: 36px; height: 36px; border: none; background: none;
      border-radius: 8px; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; color: var(--text);
    }
    .icon-btn:hover { background: var(--bg2); }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; cursor: pointer;
    }
    .cat-tabs {
      display: flex; gap: 8px; padding: 12px 20px;
      overflow-x: auto; scrollbar-width: none;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0; padding: 6px 14px;
      border: 1.5px solid var(--border); border-radius: 20px;
      background: var(--bg); font-size: 0.82rem; font-weight: 500;
      font-family: inherit; color: var(--text2); cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .cat-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .summary-bar {
      padding: 8px 20px; font-size: 0.8rem;
      color: var(--text2); background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .list-wrap { padding-bottom: 120px; }
    .cat-group-header {
      padding: 10px 20px 4px; font-size: 0.72rem; font-weight: 700;
      color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.06em; background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .item-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      transition: opacity 0.25s; animation: rowIn 0.2s ease both;
    }
    @keyframes rowIn { from{opacity:0;transform:translateY(-6px);} to{opacity:1;transform:translateY(0);} }
    .item-row.checked { opacity: 0.42; }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 0.95rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-row.checked .item-name { text-decoration: line-through; color: var(--text2); }
    .item-meta { font-size: 0.78rem; color: var(--text2); margin-top: 2px; }
    .edit-btn, .del-btn {
      width: 28px; height: 28px; border: none; background: none;
      cursor: pointer; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s; opacity: 0; flex-shrink: 0;
    }
    .edit-btn { color: var(--text2); font-size: 0.82rem; }
    .del-btn  { color: var(--border); font-size: 0.95rem; }
    .item-row:hover .edit-btn, .item-row:hover .del-btn { opacity: 1; }
    .edit-btn:hover { color: var(--accent); background: var(--accent-bg); }
    .del-btn:hover  { color: var(--danger); background: #fef2f2; }
    .cb-wrap { position: relative; width: 22px; height: 22px; flex-shrink: 0; cursor: pointer; }
    .cb-wrap input { position: absolute; opacity: 0; inset: 0; cursor: pointer; z-index: 1; margin: 0; }
    .cb-box {
      width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s; pointer-events: none;
    }
    .cb-wrap input:checked ~ .cb-box { background: var(--success); border-color: var(--success); }
    .cb-box svg { opacity: 0; transform: scale(0.4); transition: all 0.15s; }
    .cb-wrap input:checked ~ .cb-box svg { opacity: 1; transform: scale(1); }
    .empty { text-align: center; padding: 64px 20px; color: var(--text2); }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-text { font-size: 0.9rem; }
    .fab {
      position: fixed; bottom: 76px; right: 20px;
      width: 56px; height: 56px; background: var(--accent); color: #fff;
      border: none; border-radius: 50%; font-size: 1.8rem;
      cursor: pointer; box-shadow: 0 4px 16px rgba(37,99,235,.35);
      display: none; align-items: center; justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s; z-index: 50;
    }
    .fab:hover { transform: scale(1.06); }
    .fab:active { transform: scale(0.94); }
    .bottom-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; padding: 10px 20px; background: var(--bg);
      border-top: 1px solid var(--border);
      display: none; align-items: center; justify-content: space-between; z-index: 50;
    }
    .clear-btn {
      background: none; border: none; font-family: inherit;
      font-size: 0.85rem; color: var(--danger); cursor: pointer;
      padding: 6px 10px; border-radius: 8px; transition: background 0.15s;
    }
    .clear-btn:hover { background: #fef2f2; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
    .sync-dot.syncing { animation: pulse 0.9s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.2;} }
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      z-index: 200; display: none; align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--bg); border-radius: 20px 20px 0 0;
      padding: 20px 20px 32px; width: 100%; max-width: 480px;
      max-height: 85dvh; overflow-y: auto; -webkit-overflow-scrolling: touch;
      animation: slideUp .22s cubic-bezier(.4,0,.2,1);
    }
    @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
    .modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 18px; }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 0.72rem; font-weight: 700;
      color: var(--text2); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .form-input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .qty-stepper { display: flex; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; width: fit-content; }
    .qty-btn {
      width: 44px; height: 44px; border: none; background: var(--bg2);
      font-size: 1.2rem; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; transition: background 0.15s;
    }
    .qty-btn:hover { background: var(--border); }
    .qty-val { width: 52px; text-align: center; font-size: 1rem; font-weight: 700; border: none; outline: none; font-family: inherit; background: var(--bg); }
    .cat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .cat-chip {
      padding: 10px 6px; border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg); font-size: 0.8rem; font-weight: 500;
      font-family: inherit; cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .cat-chip.selected { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); font-weight: 700; }
    .link-box {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px; background: var(--bg2); border-radius: 10px; margin-bottom: 10px;
    }
    .link-text { flex: 1; font-size: 0.8rem; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .copy-btn { flex-shrink: 0; padding: 6px 14px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 700; font-family: inherit; cursor: pointer; }
    .members-wrap { margin-top: 16px; }
    .members-title { font-size: 0.72rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
    .member-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.9rem; }
    .member-av { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; }
    .me-badge { font-size: 0.72rem; color: var(--text2); }
  </style>
</head>
<body>
<div id="loadingScreen">
  <div class="spinner"></div>
  <span style="color:var(--text2);font-size:.85rem">불러오는 중...</span>
</div>
<div id="loginScreen">
  <div class="login-emoji">🛒</div>
  <h1 class="login-title">장바구니</h1>
  <p class="login-sub">가족과 함께 쓰는<br>스마트 쇼핑 리스트</p>
  <div class="login-form">
    <button class="btn btn-kakao" id="kakaoBtn">
      <svg width="18" height="17" viewBox="0 0 18 17" fill="none">
        <path d="M9 0C4.029 0 0 3.134 0 7C0 9.387 1.522 11.497 3.84 12.744L2.88 16.563C2.795 16.9 3.183 17.163 3.474 16.966L7.982 14.05C8.318 14.075 8.657 14.088 9 14.088C13.971 14.088 18 10.954 18 7.088C18 3.134 13.971 0 9 0Z" fill="#191919"/>
      </svg>
      카카오로 시작하기
    </button>
  </div>
</div>
<div id="mainScreen" style="display:none">
  <div class="header">
    <div class="header-title" id="listName">장바구니</div>
    <div class="header-right">
      <button class="icon-btn" id="shareBtn" title="공유">📤</button>
      <div class="avatar" id="userAvatar">?</div>
    </div>
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="summary-bar" id="summaryBar">항목 없음</div>
  <div class="list-wrap" id="listWrap"></div>
  <div class="empty" id="emptyState" style="display:none">
    <div class="empty-icon">🛒</div>
    <div class="empty-text">+ 버튼을 눌러 항목을 추가하세요</div>
  </div>
</div>
<button class="fab" id="fab">+</button>
<div class="bottom-bar" id="bottomBar">
  <button class="clear-btn" id="clearBtn">완료 항목 삭제</button>
  <div class="sync-dot" id="syncDot"></div>
</div>
<div class="overlay" id="addOverlay">
  <div class="modal" id="addModal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">항목 추가</div>
    <div class="form-group">
      <label class="form-label">이름</label>
      <input class="form-input" id="newName" type="text" placeholder="예: 우유" maxlength="60" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label class="form-label">수량</label>
      <div class="qty-stepper">
        <button class="qty-btn" id="qtyMinus">−</button>
        <input class="qty-val" id="newQty" type="number" value="1" min="1" max="99"/>
        <button class="qty-btn" id="qtyPlus">+</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <div class="cat-grid" id="catGrid"></div>
    </div>
    <button class="btn btn-primary" id="addSubmitBtn" style="margin-top:6px">추가하기</button>
  </div>
</div>
<div class="overlay" id="shareOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">공유하기</div>
    <div class="link-box">
      <span class="link-text" id="shareLinkText"></span>
      <button class="copy-btn" id="copyBtn">복사</button>
    </div>
    <button class="btn btn-kakao" id="kakaoShareBtn" style="margin-bottom:4px">카카오톡으로 공유</button>
    <div class="members-wrap">
      <div class="members-title">참여 멤버</div>
      <div id="membersList"></div>
    </div>
  </div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('https://ugowzkpuymwuqoqwkvfi.supabase.co','sb_publishable_ZpK0oYqtWxOmeXfUIVy9zA_qLgXNIlz');
const CATS = [
  { id: '채소', label: '🥬 채소', color: '#22c55e' },
  { id: '육류', label: '🥩 육류', color: '#ef4444' },
  { id: '유제품', label: '🥛 유제품', color: '#3b82f6' },
  { id: '냉동식품', label: '🧊 냉동식품', color: '#06b6d4' },
  { id: '음료', label: '🧃 음료', color: '#f97316' },
  { id: '기타', label: '📦 기타', color: '#9ca3af' },
];
const s = { userId:null, userName:null, avatarUrl:null, listId:null, inviteCode:null, items:[], filter:'all', selCat:'기타', channel:null, editingId:null };
async function init() {
  show('loading');
  const params = new URLSearchParams(location.search);
  const joinCode = params.get('join');
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    const u = session.user;
    s.userId = u.id;
    s.userName = u.user_metadata?.name || u.user_metadata?.full_name || u.user_metadata?.preferred_username || '사용자';
    s.avatarUrl = u.user_metadata?.avatar_url || null;
    localStorage.setItem('userId', s.userId);
    localStorage.setItem('userName', s.userName);
  }
  s.listId = localStorage.getItem('listId');
  if (!s.userId) { if (joinCode) localStorage.setItem('pendingJoin', joinCode); show('login'); return; }
  const pendingJoin = localStorage.getItem('pendingJoin');
  if (pendingJoin) { localStorage.removeItem('pendingJoin'); await joinList(pendingJoin); history.replaceState({},''  ,location.pathname); }
  else if (joinCode) { await joinList(joinCode); history.replaceState({},'',location.pathname); }
  else if (!s.listId) { await findOrCreateList(); }
  if (location.hash || location.search) history.replaceState({},'',location.pathname);
  await Promise.all([loadMeta(), loadItems()]);
  setupRealtime(); show('main'); buildUI();
}
document.getElementById('kakaoBtn').onclick = async () => {
  const { error } = await sb.auth.signInWithOAuth({ provider: 'kakao', options: { redirectTo: location.origin + location.pathname, scopes: 'profile_nickname profile_image', queryParams: { scope: 'profile_nickname profile_image' } } });
  if (error) alert('카카오 로그인 오류: ' + error.message);
};
async function findOrCreateList() {
  const { data: m } = await sb.from('list_members').select('list_id').eq('user_id', s.userId).order('joined_at',{ascending:true}).limit(1).maybeSingle();
  if (m?.list_id) { s.listId = m.list_id; localStorage.setItem('listId', s.listId); } else { await createList(); }
}
async function createList() {
  const { data, error } = await sb.from('lists').insert({ name: `${s.userName}의 장바구니` }).select().single();
  if (error) { console.error(error); return; }
  s.listId = data.id; s.inviteCode = data.invite_code; localStorage.setItem('listId', s.listId);
  await sb.from('list_members').insert({ list_id: s.listId, user_id: s.userId, display_name: s.userName });
}
async function joinList(code) {
  const { data: list } = await sb.from('lists').select('*').eq('invite_code', code).single();
  if (!list) { alert('유효하지 않은 초대 링크입니다.'); return; }
  s.listId = list.id; s.inviteCode = list.invite_code; localStorage.setItem('listId', s.listId);
  await sb.from('list_members').upsert({ list_id: s.listId, user_id: s.userId, display_name: s.userName });
}
async function loadMeta() {
  const { data } = await sb.from('lists').select('*').eq('id', s.listId).single();
  if (!data) return; s.inviteCode = data.invite_code; document.getElementById('listName').textContent = data.name;
}
async function loadItems() {
  setSyncing(true);
  const { data } = await sb.from('shopping_items').select('*').eq('list_id', s.listId).order('created_at',{ascending:false});
  setSyncing(false); s.items = data || []; render();
}
async function addItem() {
  const text = document.getElementById('newName').value.trim();
  const qty = Math.max(1, parseInt(document.getElementById('newQty').value) || 1);
  if (!text) { document.getElementById('newName').focus(); return; }
  closeOverlay('addOverlay'); setSyncing(true);
  if (s.editingId) {
    await sb.from('shopping_items').update({ text, quantity: qty, category: s.selCat }).eq('id', s.editingId);
    const item = s.items.find(i => i.id === s.editingId);
    if (item) { item.text = text; item.quantity = qty; item.category = s.selCat; } s.editingId = null;
  } else {
    const { data } = await sb.from('shopping_items').insert({ list_id: s.listId, text, quantity: qty, category: s.selCat, checked: false }).select().single();
    if (data) s.items.unshift(data);
  }
  setSyncing(false); render();
}
function openEditModal(item) {
  s.editingId = item.id; s.selCat = item.category;
  document.getElementById('newName').value = item.text;
  document.getElementById('newQty').value = item.quantity;
  document.getElementById('modalTitle').textContent = '항목 수정';
  document.getElementById('addSubmitBtn').textContent = '수정하기';
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('selected', c.dataset.cat === item.category));
  const overlay = document.getElementById('addOverlay'); overlay.style.bottom = '0px'; overlay.classList.add('open');
  setTimeout(() => document.getElementById('newName').focus(), 250);
}
async function toggleItem(id) {
  const item = s.items.find(i => i.id === id); if (!item) return;
  setSyncing(true); await sb.from('shopping_items').update({ checked: !item.checked }).eq('id', id);
  setSyncing(false); item.checked = !item.checked; render();
}
async function deleteItem(id) {
  setSyncing(true); await sb.from('shopping_items').delete().eq('id', id);
  setSyncing(false); s.items = s.items.filter(i => i.id !== id); render();
}
document.getElementById('clearBtn').onclick = async () => {
  setSyncing(true); await sb.from('shopping_items').delete().eq('list_id', s.listId).eq('checked', true);
  setSyncing(false); s.items = s.items.filter(i => !i.checked); render();
};
function setupRealtime() {
  if (s.channel) sb.removeChannel(s.channel);
  s.channel = sb.channel('list-' + s.listId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'shopping_items', filter: `list_id=eq.${s.listId}` },
      ({ eventType, new: n, old: o }) => {
        if (eventType === 'INSERT') { if (!s.items.find(i => i.id === n.id)) s.items.unshift(n); }
        else if (eventType === 'UPDATE') { const idx = s.items.findIndex(i => i.id === n.id); if (idx !== -1) s.items[idx] = n; }
        else if (eventType === 'DELETE') { s.items = s.items.filter(i => i.id !== o.id); }
        render();
      }).subscribe();
}
function render() {
  const wrap = document.getElementById('listWrap'), empty = document.getElementById('emptyState');
  const total = s.items.length, done = s.items.filter(i => i.checked).length;
  document.getElementById('summaryBar').textContent = total === 0 ? '항목 없음' : `${total}개 항목 · 완료 ${done}개`;
  const filtered = s.filter === 'all' ? s.items : s.items.filter(i => i.category === s.filter);
  if (!filtered.length) { wrap.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  const grouped = {}; filtered.forEach(item => (grouped[item.category] = grouped[item.category] || []).push(item));
  wrap.innerHTML = '';
  CATS.forEach(({ id: catId, label, color }) => {
    if (!grouped[catId]) return;
    if (s.filter === 'all') { const h = document.createElement('div'); h.className = 'cat-group-header'; h.textContent = label; wrap.appendChild(h); }
    grouped[catId].forEach((item, idx) => {
      const row = document.createElement('div'); row.className = 'item-row' + (item.checked ? ' checked' : ''); row.style.animationDelay = idx * 0.03 + 's';
      const dot = document.createElement('div'); dot.className = 'cat-dot'; dot.style.background = color;
      const info = document.createElement('div'); info.className = 'item-info';
      info.innerHTML = `<div class="item-name">${esc(item.text)}</div><div class="item-meta">${item.quantity}개 · ${esc(item.category)}</div>`;
      const edit = document.createElement('button'); edit.className = 'edit-btn'; edit.textContent = '✏'; edit.setAttribute('aria-label', `${item.text} 수정`); edit.onclick = e => { e.stopPropagation(); openEditModal(item); };
      const del = document.createElement('button'); del.className = 'del-btn'; del.textContent = '✕'; del.onclick = () => deleteItem(item.id);
      const cbWrap = document.createElement('label'); cbWrap.className = 'cb-wrap';
      const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = item.checked; cb.onchange = () => toggleItem(item.id);
      const cbBox = document.createElement('div'); cbBox.className = 'cb-box';
      cbBox.innerHTML = `<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      cbWrap.append(cb, cbBox); row.append(dot, info, edit, del, cbWrap); wrap.appendChild(row);
    });
  });
}
function buildUI() {
  const av = document.getElementById('userAvatar');
  if (s.avatarUrl) av.innerHTML = `<img src="${s.avatarUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover" alt="">`;
  else av.textContent = (s.userName || '?')[0].toUpperCase();
  av.title = s.userName || '';
  av.onclick = async () => { if (confirm(`${s.userName}님, 로그아웃 하시겠습니까?`)) { await sb.auth.signOut(); localStorage.clear(); location.reload(); } };
  const tabs = document.getElementById('catTabs'); tabs.innerHTML = '';
  [{ id: 'all', label: '전체' }, ...CATS].forEach(cat => {
    const btn = document.createElement('button'); btn.className = 'cat-tab' + (s.filter === cat.id ? ' active' : ''); btn.textContent = cat.label;
    btn.onclick = () => { s.filter = cat.id; document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); };
    tabs.appendChild(btn);
  });
  const grid = document.getElementById('catGrid'); grid.innerHTML = '';
  CATS.forEach(cat => {
    const chip = document.createElement('button'); chip.className = 'cat-chip' + (s.selCat === cat.id ? ' selected' : ''); chip.dataset.cat = cat.id; chip.textContent = cat.label;
    chip.onclick = () => { s.selCat = cat.id; document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected')); chip.classList.add('selected'); };
    grid.appendChild(chip);
  });
}
function adjustForKeyboard() {
  const overlay = document.getElementById('addOverlay'); if (!overlay.classList.contains('open')) return;
  const vv = window.visualViewport; if (!vv) return;
  overlay.style.bottom = Math.max(0, window.innerHeight - vv.height - vv.offsetTop) + 'px';
}
window.visualViewport?.addEventListener('resize', adjustForKeyboard);
window.visualViewport?.addEventListener('scroll', adjustForKeyboard);
document.getElementById('fab').onclick = () => {
  s.editingId = null; s.selCat = '기타';
  document.getElementById('newName').value = ''; document.getElementById('newQty').value = '1';
  document.getElementById('modalTitle').textContent = '항목 추가'; document.getElementById('addSubmitBtn').textContent = '추가하기';
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('selected', c.dataset.cat === '기타'));
  const overlay = document.getElementById('addOverlay'); overlay.style.bottom = '0px'; overlay.classList.add('open');
  setTimeout(() => document.getElementById('newName').focus(), 250);
};
document.getElementById('addSubmitBtn').onclick = addItem;
document.getElementById('newName').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
document.getElementById('qtyMinus').onclick = () => { const el = document.getElementById('newQty'); el.value = Math.max(1, (parseInt(el.value)||1) - 1); };
document.getElementById('qtyPlus').onclick = () => { const el = document.getElementById('newQty'); el.value = Math.min(99, (parseInt(el.value)||1) + 1); };
document.getElementById('addOverlay').onclick = e => { if (e.target === document.getElementById('addOverlay')) closeOverlay('addOverlay'); };
document.getElementById('shareBtn').onclick = async () => {
  const url = `${location.origin}${location.pathname}?join=${s.inviteCode}`;
  document.getElementById('shareLinkText').textContent = url;
  const { data: members } = await sb.from('list_members').select('*').eq('list_id', s.listId);
  document.getElementById('membersList').innerHTML = (members || []).map(m => `<div class="member-row"><div class="member-av">${esc((m.display_name||'?')[0].toUpperCase())}</div><span>${esc(m.display_name||'멤버')}</span>${m.user_id === s.userId ? '<span class="me-badge">(나)</span>' : ''}</div>`).join('');
  document.getElementById('shareOverlay').classList.add('open');
};
document.getElementById('shareOverlay').onclick = e => { if (e.target === document.getElementById('shareOverlay')) closeOverlay('shareOverlay'); };
document.getElementById('copyBtn').onclick = () => { navigator.clipboard.writeText(document.getElementById('shareLinkText').textContent).then(() => { const btn = document.getElementById('copyBtn'); btn.textContent = '완료!'; setTimeout(() => btn.textContent = '복사', 2000); }); };
document.getElementById('kakaoShareBtn').onclick = () => {
  const url = document.getElementById('shareLinkText').textContent;
  if (window.Kakao?.Share) { Kakao.Share.sendDefault({ objectType: 'feed', content: { title: '쇼핑 리스트 공유', description: '함께 장보기 목록을 작성해요!', link: { mobileWebUrl: url, webUrl: url } } }); }
  else { navigator.clipboard.writeText(url); alert('링크가 복사되었습니다.\n카카오톡에 붙여넣기 해주세요.'); }
};
function show(name) {
  document.getElementById('loadingScreen').style.display = name === 'loading' ? 'flex' : 'none';
  document.getElementById('loginScreen').classList.toggle('active', name === 'login');
  document.getElementById('mainScreen').style.display = name === 'main' ? 'block' : 'none';
  document.getElementById('fab').style.display = name === 'main' ? 'flex' : 'none';
  document.getElementById('bottomBar').style.display = name === 'main' ? 'flex' : 'none';
}
function closeOverlay(id) { const el = document.getElementById(id); el.classList.remove('open'); el.style.bottom = '0px'; }
function setSyncing(on) { document.getElementById('syncDot')?.classList.toggle('syncing', on); }
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
init();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/mobile/sw.js').catch(err => console.warn('SW 등록 실패:', err));
  }
</script>
